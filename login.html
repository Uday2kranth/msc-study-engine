<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.Sc Study Engine - Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 0.75rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            color: var(--text-main);
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: var(--accent-primary);
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-primary);
            border: none;
            border-radius: 0.25rem;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #4f46e5;
        }
        .error-msg {
            color: var(--accent-danger);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container login-wrapper">
        <div class="login-card">
            <h2 style="margin-bottom: 0.5rem; text-align: center;">Secure Gateway</h2>
            <p class="subtitle" style="text-align: center; margin-bottom: 2rem;">Authorized Exam Prep Users Only</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="userId">Unique User ID</label>
                    <input type="text" id="userId" class="form-control" placeholder="Enter your assigned ID" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Verify Identity</button>
                <div id="errorBlock" class="error-msg">Invalid User ID or Password configuration.</div>
            </form>
        </div>
    </div>

    <!-- Inject the credentials mapping script -->
    <script src="auth.js"></script>
</body>
</html>
